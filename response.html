<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Thoughts 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
min-height:100vh;
display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#ffd6e7,#e8d9ff,#d7f0ff);
overflow-y:auto;
position:relative;
padding:40px 20px;
transition: opacity 0.8s ease;
opacity:0;
}
body.loaded{opacity:1;}
.container{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(14px);
padding:50px 35px;
border-radius:28px;
box-shadow:0 20px 45px rgba(0,0,0,0.15);
text-align:center;
max-width:600px;
position:relative;
}
h1{font-family:'Pacifico',cursive;font-size:40px;color:#ff4f81;margin-bottom:15px;}
p{font-size:16px;margin-bottom:20px;line-height:1.6;}
textarea{
width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;margin-bottom:15px;font-size:14px;
}
button{
padding:14px 28px;border:none;border-radius:30px;font-size:16px;cursor:pointer;color:white;
background:linear-gradient(135deg,#ff7eb3,#ff758c);transition:0.3s;
}
button:hover{transform:scale(1.08);box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.heart{position:fixed;font-size:14px;pointer-events:none;animation:float 1s linear forwards;opacity:0.5;}
@keyframes float{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-20px);opacity:0}}
#thankYou{margin-top:15px;color:#ff4f81;font-size:15px;}
</style>
</head>
<body><div class="container">
<h1>Thank You 💖</h1>
<p>I'm so happy! Now I want to know… anything you feel or know about me. Feel free to write honestly 😊</p>
<textarea id="userInput" rows="5" placeholder="Your thoughts here..."></textarea>
<button onclick="submitResponse()">Submit 💌</button>
<p id="thankYou"></p>
</div><script>
window.addEventListener('DOMContentLoaded', () => {
  document.body.classList.add('loaded');
});

// floating hearts effect
const colors = ['#ff4f81','#ff7eb3','#ff758c','#7aa6ff','#5b7cfa'];
document.addEventListener('mousemove', e => {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.innerHTML = '❤';
  heart.style.left = e.pageX + 'px';
  heart.style.top = e.pageY + 'px';
  heart.style.color = colors[Math.floor(Math.random()*colors.length)];
  heart.style.fontSize = (10 + Math.random()*12)+'px';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),900);
});

// Submit function redirects to tq.html with review text
function submitResponse(){
    const val = document.getElementById('userInput').value.trim();
    if(val.length > 0){
        // Redirect to final thank you page with review text
        window.location.href = 'tq.html?text=' + encodeURIComponent(val);
    } else {
        document.getElementById('thankYou').innerText = 'Please write something before submitting 😅';
    }
}
</script></body>
</html>
